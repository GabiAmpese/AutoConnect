<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cirocar - Atendimento Virtual</title>
    <style>
        /* === TEMA DARK MODE - CIROCAR === */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .cabecalho {
            width: 100%;
            max-width: 1200px;
            background-color: #000000; 
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(204, 255, 0, 0.1); 
            box-sizing: border-box;
            border-bottom: 3px solid #ccff00; 
        }
        
        .logo {
            max-height: 80px;
            object-fit: contain;
        }

        .container-paineis {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .painel { 
            flex: 1; 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #333;
        }
        
        h2 { color: #ccff00; margin-top: 0; }

        /* Estilo dos Botões */
        button { 
            padding: 10px; 
            cursor: pointer; 
            background: #ccff00; 
            color: #000000; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            text-transform: uppercase;
            font-size: 0.9em;
            transition: 0.2s;
        }
        button:hover:not(:disabled) { background: #b3e600; box-shadow: 0 0 10px rgba(204, 255, 0, 0.4); }
        
        .btn-acao { background: #00d26a; color: #000; margin-top: 10px; }
        .btn-acao:hover:not(:disabled) { background: #00b35a; }
        
        .btn-encerrar { background: #dc3545 !important; color: white !important; } 
        
        /* Itens desativados (texto alterado para branco) */
        button:disabled { opacity: 1; background: #444; color: #ffffff; cursor: not-allowed; }
        input:disabled, select:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Caixas de Texto e Selects */
        input, select { 
            padding: 10px; 
            background-color: #2a2a2a; 
            color: #ffffff; 
            border: 1px solid #444; 
            border-radius: 4px; 
        }
        input:focus, select:focus { outline: none; border-color: #ccff00; }
        
        /* Textos de placeholder em branco */
        ::placeholder { color: #ffffff; opacity: 0.8; }
        
        /* Área do Chat */
        .log { 
            background: #0a0a0a; 
            padding: 10px; 
            margin-top: 15px; 
            border-radius: 4px; 
            border: 1px solid #333;
            min-height: 150px; 
            max-height: 200px; 
            overflow-y: auto; 
            font-size: 0.95em; 
        }
        
        .chat-area { margin-top: 15px; padding-top: 15px; border-top: 1px solid #333; display: flex; gap: 10px; }
        .campo-chat { flex-grow: 1; }
        .controles { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        
        /* Destaques e Serviços */
        .secao-servicos { 
            margin-top: 20px; 
            padding: 15px; 
            background: #111; 
            border: 1px solid #ccff00; 
            border-radius: 4px; 
        }
        .secao-servicos h3 { margin-top: 0; font-size: 1.1em; color: #ccff00; }
        #lista-servicos { list-style: none; padding: 0; margin: 0; font-size: 0.9em; }
        #lista-servicos li { padding: 8px 0; border-bottom: 1px solid #333; }
        #lista-servicos li:last-child { border-bottom: none; }

        .destaque { background-color: #2a2a2a; padding: 10px; border-radius: 4px; font-weight: bold; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="cabecalho">
        <img src="logo.jpeg" alt="Cirocar Mecânica Automotiva" class="logo">
    </div>

    <div class="container-paineis">
        
        <div class="painel" id="painel-cliente">
            <h2>👤 Painel do Cliente</h2>
            
            <div class="controles">
                <input type="text" id="nome-cliente" placeholder="Seu Nome (Ex: João)">
                <select id="tipo-problema" disabled>
                    <option value="Freio fazendo barulho">Freios</option>
                    <option value="Motor superaquecendo">Motor</option>
                    <option value="Suspensão batendo">Suspensão</option>
                    <option value="Revisão geral">Revisão Geral</option>
                </select>
                <button id="btn-solicitar" onclick="solicitarOrcamento()" disabled>1. Solicitar</button>
            </div>
            
            <button id="btn-aprovar" class="btn-acao" onclick="aprovarOrcamento()" disabled>3. Aprovar Orçamento</button>
            
            <div class="chat-area">
                <button id="btn-toggle-cliente" onclick="alternarChat('Cliente', 'input-cliente', 'btn-enviar-cliente', 'btn-toggle-cliente')">Iniciar Atendimento</button>
                <input type="text" id="input-cliente" class="campo-chat" placeholder="Chat..." disabled onkeypress="verificarEnter(event, 'Cliente', 'input-cliente')">
                <button id="btn-enviar-cliente" onclick="enviarChat('Cliente', 'input-cliente')" disabled>Enviar</button>
            </div>

            <div id="log-cliente" class="log"></div>
        </div>

        <div class="painel" id="painel-oficina">
            <h2>🔧 Cirocar Oficina</h2>
            
            <div class="controles destaque">
                <label for="cliente-alvo" style="font-size: 0.9em; color: #ffffff;">Responder a:</label>
                <select id="cliente-alvo" style="flex-grow: 1;" disabled>
                    <option value="">Aguardando pedidos...</option>
                </select>
            </div>

            <div class="controles">
                <input type="number" id="valor-orcamento" placeholder="Valor R$" style="width: 100px;" disabled>
                <button id="btn-enviar-prop" onclick="enviarOrcamento()" disabled>2. Enviar Proposta</button>
            </div>
            
            <button id="btn-confirmar" class="btn-acao" onclick="confirmarServico()" disabled>4. Confirmar Serviço</button>
            
            <div class="chat-area">
                <button id="btn-toggle-oficina" onclick="alternarChat('Oficina', 'input-oficina', 'btn-enviar-oficina', 'btn-toggle-oficina')">Iniciar Atendimento</button>
                <input type="text" id="input-oficina" class="campo-chat" placeholder="Chat..." disabled onkeypress="verificarEnter(event, 'Oficina', 'input-oficina')">
                <button id="btn-enviar-oficina" onclick="enviarChat('Oficina', 'input-oficina')" disabled>Enviar</button>
            </div>

            <div id="log-oficina" class="log"></div>

            <div class="secao-servicos">
                <h3>📋 Serviços Aceitos</h3>
                <ul id="lista-servicos"></ul>
            </div>
        </div>

    </div>

    <script>
        const socket = new WebSocket("ws://localhost:8888/ws");

        function adicionarNoLog(elemento, texto) {
            const div = document.getElementById(elemento);
            texto = texto.replace("⚠️", "<span style='color: #ffc107;'>⚠️</span>");
            texto = texto.replace("💰", "<span style='color: #00d26a;'>💰</span>");
            texto = texto.replace("✅", "<span style='color: #ccff00;'>✅</span>");
            texto = texto.replace("🚗", "<span style='color: #17a2b8;'>🚗</span>");
            
            div.innerHTML += `<div style="margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid #222;">${texto}</div>`;
            div.scrollTop = div.scrollHeight; 
        }

        socket.onmessage = function(event) {
            const dados = JSON.parse(event.data);
            const meuNome = document.getElementById("nome-cliente").value;

            if(dados.acao === "solicitar_orcamento") {
                adicionarNoLog("log-oficina", `⚠️ <b style="color:#ccff00;">${dados.cliente}</b> solicita: ${dados.problema}`);
                const selectAlvo = document.getElementById("cliente-alvo");
                if(selectAlvo.options[0].value === "") { selectAlvo.remove(0); }
                const opt = document.createElement("option");
                opt.value = dados.cliente;
                opt.dataset.problema = dados.problema;
                opt.text = `${dados.cliente} (${dados.problema})`;
                selectAlvo.appendChild(opt);
            } 
            else if(dados.acao === "enviar_orcamento" && dados.destinatario === meuNome) {
                adicionarNoLog("log-cliente", `💰 <b>Proposta da Oficina:</b> R$ ${dados.valor}`);
            }
            else if(dados.acao === "aprovar_orcamento") {
                adicionarNoLog("log-oficina", `✅ <b style="color:#ccff00;">${dados.cliente}</b> aprovou o valor!`);
            }
            else if(dados.acao === "confirmar_demanda" && dados.destinatario === meuNome) {
                adicionarNoLog("log-cliente", `🚗 <b style="color:#ccff00;">Cirocar confirmou:</b> ${dados.mensagem}`);
            }
            else if(dados.acao === "registrar_lista") {
                registrarServicoNaLista(dados.cliente, dados.problema);
            }
            else if(dados.acao === "chat") {
                const corRemetente = dados.remetente === "Oficina" ? "#ccff00" : "#fff";
                const msg = `💬 <b style="color:${corRemetente};">${dados.remetente}:</b> ${dados.texto}`;
                if (dados.remetente === "Oficina") {
                    if (dados.destinatario === meuNome) adicionarNoLog("log-cliente", msg);
                    // Texto do destinatário alterado para branco (#ffffff)
                    adicionarNoLog("log-oficina", msg + ` <i style="color:#ffffff; font-size: 0.85em;">(para ${dados.destinatario})</i>`);
                } else {
                    if (dados.remetente === meuNome) adicionarNoLog("log-cliente", msg);
                    adicionarNoLog("log-oficina", msg);
                }
            }
        };

        function solicitarOrcamento() {
            const nome = document.getElementById("nome-cliente").value;
            if(!nome) { alert("Digite seu nome!"); return; }
            const problema = document.getElementById("tipo-problema").value;
            socket.send(JSON.stringify({ acao: "solicitar_orcamento", cliente: nome, problema: problema }));
        }

        function enviarOrcamento() {
            const clienteSelecionado = document.getElementById("cliente-alvo").value;
            if(!clienteSelecionado) { alert("Selecione um cliente!"); return; }
            const valor = document.getElementById("valor-orcamento").value || "A avaliar";
            socket.send(JSON.stringify({ acao: "enviar_orcamento", valor: valor, destinatario: clienteSelecionado }));
        }

        function aprovarOrcamento() { 
            const nome = document.getElementById("nome-cliente").value;
            socket.send(JSON.stringify({ acao: "aprovar_orcamento", cliente: nome })); 
        }

        function confirmarServico() { 
            const selectAlvo = document.getElementById("cliente-alvo");
            const clienteAlvo = selectAlvo.value;
            if(!clienteAlvo) { alert("Selecione um cliente!"); return; }
            const problemaAlvo = selectAlvo.options[selectAlvo.selectedIndex].dataset.problema;
            socket.send(JSON.stringify({ acao: "confirmar_demanda", mensagem: "Serviço agendado!", destinatario: clienteAlvo })); 
            socket.send(JSON.stringify({ acao: "registrar_lista", cliente: clienteAlvo, problema: problemaAlvo }));
            selectAlvo.remove(selectAlvo.selectedIndex);
            if(selectAlvo.length === 0) { selectAlvo.innerHTML = '<option value="">Aguardando pedidos...</option>'; }
        }

        function registrarServicoNaLista(cliente, problema) {
            const lista = document.getElementById("lista-servicos");
            const novoItem = document.createElement("li");
            novoItem.innerHTML = `<b style="color:#fff;">${cliente}</b> - ${problema} <span style="color:#ccff00;">✅</span>`;
            lista.appendChild(novoItem);
        }

        function alternarChat(remetente, inputId, btnEnviarId, btnToggleId) {
            const input = document.getElementById(inputId);
            const btnToggle = document.getElementById(btnToggleId);
            const nomeInput = document.getElementById("nome-cliente");
            
            if (remetente === 'Cliente' && input.disabled) {
                if (!nomeInput.value) {
                    alert("Digite seu nome antes de iniciar!");
                    nomeInput.disabled = false;
                    return;
                }
            }

            let controles = remetente === 'Cliente' ? 
                [document.getElementById('tipo-problema'), document.getElementById('btn-solicitar'), document.getElementById('btn-aprovar')] :
                [document.getElementById('cliente-alvo'), document.getElementById('valor-orcamento'), document.getElementById('btn-enviar-prop'), document.getElementById('btn-confirmar')];

            if (input.disabled) {
                input.disabled = false;
                document.getElementById(btnEnviarId).disabled = false;
                controles.forEach(e => e.disabled = false);
                btnToggle.innerText = "Encerrar Atendimento";
                btnToggle.classList.add("btn-encerrar");
                
                if (remetente === 'Cliente') {
                    nomeInput.disabled = true;
                }
            } else {
                input.disabled = true;
                document.getElementById(btnEnviarId).disabled = true;
                controles.forEach(e => e.disabled = true);
                btnToggle.innerText = "Iniciar Atendimento";
                btnToggle.classList.remove("btn-encerrar");

                if (remetente === 'Cliente') {
                    nomeInput.value = ""; 
                    nomeInput.disabled = false; 
                    document.getElementById("log-cliente").innerHTML = ""; 
                }
            }
        }

        function enviarChat(remetente, inputId) {
            const campo = document.getElementById(inputId);
            if (campo.value.trim() !== "") {
                const clienteAlvo = document.getElementById("cliente-alvo").value;
                const nomeCliente = document.getElementById("nome-cliente").value;
                const dest = remetente === "Oficina" ? clienteAlvo : "Oficina";
                const env = remetente === "Oficina" ? "Oficina" : nomeCliente;
                if(remetente === "Oficina" && !clienteAlvo) { alert("Selecione um cliente!"); return; }
                socket.send(JSON.stringify({ acao: "chat", remetente: env, destinatario: dest, texto: campo.value }));
                campo.value = ""; 
            }
        }

        function verificarEnter(e, r, i) { if (e.key === "Enter") enviarChat(r, i); }
    </script>
</body>
</html>
